name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sdgzero
          POSTGRES_PASSWORD: sdgzero
          POSTGRES_DB: sdgzero
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sdgzero -d sdgzero"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://sdgzero:sdgzero@localhost:5432/sdgzero
      GROQ_API_KEY: dummy
      TAVILY_API_KEY: dummy
      LLM_PROVIDER: groq

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Check imports
        run: |
          python -c "from agent.graph import run_pipeline"
          python -c "from db.pg_store import PGStore"
          python -c "from api.main import app"

      - name: Init DB schema
        run: |
          python -c "
          from db.pg_store import PGStore
          store = PGStore()
          store.init_schema()
          print('Schema OK')
          "

      - name: Start API and health check
        run: |
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 15
          curl -f http://localhost:8000/api/health

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://sdg0partnerfindersystem-production.up.railway.app
        run: npm run build
